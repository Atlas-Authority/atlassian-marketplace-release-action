name: Request review from product-studio
on:
    pull_request:
        types: [opened, ready_for_review, synchronize]

permissions:
    pull-requests: write

jobs:
    request-review:
        name: Request review from product-studio
        runs-on: ubuntu-latest
        # Only run if PR is not a draft
        if: github.event.pull_request.draft == false
        steps:
            - name: Request review from product-studio team
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GH_TOKEN_MANAGE_PROJECT }}
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const eventAction = context.payload.action;

                      // For synchronize events (new commits), check if there was a previous
                      // "changes requested" review that we should re-request review for
                      if (eventAction === 'synchronize') {
                        const reviews = await github.rest.pulls.listReviews({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: prNumber
                        });

                        // Find the latest review state
                        const latestReview = reviews.data
                          .filter(r => r.state === 'CHANGES_REQUESTED' || r.state === 'APPROVED')
                          .sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at))[0];

                        // Only re-request review if the latest review was changes_requested
                        if (!latestReview || latestReview.state !== 'CHANGES_REQUESTED') {
                          console.log('No changes_requested review found - skipping re-request');
                          return;
                        }
                        console.log('Changes were previously requested - re-requesting review after new commits');
                      }

                      try {
                        await github.rest.pulls.requestReviewers({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: prNumber,
                          team_reviewers: ['product-studio']
                        });
                        console.log(`Requested review from Atlas-Authority/product-studio for PR #${prNumber}`);
                      } catch (error) {
                        console.log(`Could not request review: ${error.message}`);
                      }
