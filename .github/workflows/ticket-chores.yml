name: Ticket chores
on:
    pull_request:
        types: [opened, closed]

env:
    PROJECT_URL: 'https://github.com/orgs/Atlas-Authority/projects/4'
    ORG_NAME: Atlas-Authority

permissions:
    pull-requests: write

jobs:
    ticket-chores-opened:
        name: Ticket chores (opened)
        runs-on: ubuntu-latest
        if: github.event.action == 'opened'
        steps:
            - name: Assign PR to creator
              uses: actions/github-script@v7
              with:
                  script: |
                      const creator = context.payload.pull_request.user.login;
                      await github.rest.issues.addAssignees({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                        assignees: [creator]
                      });
                      console.log(`Assigned PR #${context.payload.pull_request.number} to ${creator}`);

            - name: Add PR to project board
              id: add-to-project
              uses: actions/add-to-project@v1.0.2
              with:
                  project-url: ${{ env.PROJECT_URL }}
                  github-token: ${{ secrets.GH_TOKEN_MANAGE_PROJECT }}

            - name: Set project status to In Progress
              uses: actions/github-script@v7
              env:
                  PROJECT_URL: ${{ env.PROJECT_URL }}
              with:
                  github-token: ${{ secrets.GH_TOKEN_MANAGE_PROJECT }}
                  script: |
                      const itemId = '${{ steps.add-to-project.outputs.itemId }}';

                      if (!itemId) {
                        console.log('No itemId from add-to-project step - skipping status update');
                        return;
                      }

                      const projectUrl = process.env.PROJECT_URL;

                      // Extract project number from URL
                      const projectNumber = parseInt(projectUrl.split('/').pop());

                      try {
                        // Get project ID and Status field info
                        const projectQuery = `
                          query($org: String!, $number: Int!) {
                            organization(login: $org) {
                              projectV2(number: $number) {
                                id
                                field(name: "Status") {
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    options {
                                      id
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        `;

                        const projectData = await github.graphql(projectQuery, {
                          org: '${{ env.ORG_NAME }}',
                          number: projectNumber
                        });

                        const project = projectData.organization.projectV2;
                        const statusField = project.field;
                        const inProgressOption = statusField.options.find(opt => opt.name === 'In Progress');

                        if (!inProgressOption) {
                          console.log('Could not find "In Progress" status option');
                          return;
                        }

                        // Update the item status
                        const mutation = `
                          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                            updateProjectV2ItemFieldValue(input: {
                              projectId: $projectId
                              itemId: $itemId
                              fieldId: $fieldId
                              value: { singleSelectOptionId: $optionId }
                            }) {
                              projectV2Item {
                                id
                              }
                            }
                          }
                        `;

                        await github.graphql(mutation, {
                          projectId: project.id,
                          itemId: itemId,
                          fieldId: statusField.id,
                          optionId: inProgressOption.id
                        });

                        console.log(`Set project item status to "In Progress"`);
                      } catch (error) {
                        console.log(`Could not set project status: ${error.message}`);
                      }

            - name: Add Jira link to PR description
              uses: actions/github-script@v7
              with:
                  script: |
                      const branchName = context.payload.pull_request.head.ref;
                      const parts = branchName.split('/');

                      // Check if branch name has exactly 3 parts (ACTION/TICKET_ID/DESCRIPTION)
                      if (parts.length !== 3) {
                        console.log(`Branch name "${branchName}" does not match pattern ACTION/TICKET_ID/DESCRIPTION`);
                        return;
                      }

                      const ticketId = parts[1];
                      const currentBody = context.payload.pull_request.body || '';
                      const jiraBaseUrl = 'https://atlasauthority.atlassian.net/browse';
                      const jiraUrl = `${jiraBaseUrl}/${ticketId}`;

                      // Check if the Jira link already exists in the PR description
                      if (currentBody.includes(jiraUrl)) {
                        console.log(`Jira link for ticket ${ticketId} already exists in PR #${context.payload.pull_request.number}`);
                        return;
                      }

                      const jiraLink = `Jira ticket: [${ticketId}](${jiraUrl})`;

                      // Add the Jira link at the first line
                      const newBody = `${jiraLink}\n\n${currentBody}`;

                      await github.rest.pulls.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.payload.pull_request.number,
                        body: newBody
                      });

                      console.log(`Added Jira link for ticket ${ticketId} to PR #${context.payload.pull_request.number}`);

    ticket-chores-merged:
        name: Ticket chores (merged)
        runs-on: ubuntu-latest
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        steps:
            - name: Set project status to Done
              uses: actions/github-script@v7
              env:
                  PROJECT_URL: ${{ env.PROJECT_URL }}
              with:
                  github-token: ${{ secrets.GH_TOKEN_MANAGE_PROJECT }}
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const projectUrl = process.env.PROJECT_URL;
                      const projectNumber = parseInt(projectUrl.split('/').pop());

                      try {
                        // First, find the project item for this PR
                        const findItemQuery = `
                          query($org: String!, $number: Int!) {
                            organization(login: $org) {
                              projectV2(number: $number) {
                                id
                                field(name: "Status") {
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    options {
                                      id
                                      name
                                    }
                                  }
                                }
                                items(first: 100) {
                                  nodes {
                                    id
                                    content {
                                      ... on PullRequest {
                                        url
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        `;

                        const prUrl = context.payload.pull_request.html_url;
                        const projectData = await github.graphql(findItemQuery, {
                          org: '${{ env.ORG_NAME }}',
                          number: projectNumber
                        });

                        const project = projectData.organization.projectV2;
                        const statusField = project.field;
                        const doneOption = statusField.options.find(opt => opt.name === 'Done');

                        if (!doneOption) {
                          console.log('Could not find "Done" status option');
                          return;
                        }

                        // Find the item matching this PR
                        const item = project.items.nodes.find(item =>
                          item.content && item.content.url === prUrl
                        );

                        if (!item) {
                          console.log(`Could not find project item for PR ${prUrl}`);
                          return;
                        }

                        // Update the item status to Done
                        const mutation = `
                          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                            updateProjectV2ItemFieldValue(input: {
                              projectId: $projectId
                              itemId: $itemId
                              fieldId: $fieldId
                              value: { singleSelectOptionId: $optionId }
                            }) {
                              projectV2Item {
                                id
                              }
                            }
                          }
                        `;

                        await github.graphql(mutation, {
                          projectId: project.id,
                          itemId: item.id,
                          fieldId: statusField.id,
                          optionId: doneOption.id
                        });

                        console.log(`Set project item status to "Done" for PR #${prNumber}`);
                      } catch (error) {
                        console.log(`Could not set project status to Done: ${error.message}`);
                      }
